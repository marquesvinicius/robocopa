# Liga o Web Service robocopa no Render — 10:00 (horário de Brasília)
# 10:00 BRT = 13:00 UTC (Brasil não usa horário de verão desde 2019)
name: Render — Ligar Robocopa

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

concurrency:
  group: render-schedule
  cancel-in-progress: false

jobs:
  resume:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HEALTH_URL: https://robocopa.onrender.com/health
    steps:
      - name: Validar secrets
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ] || [ -z "${{ secrets.RENDER_SERVICE_ID }}" ]; then
            echo "::error::Configure os secrets RENDER_API_KEY e RENDER_SERVICE_ID no repositório GitHub."
            exit 1
          fi

      - name: Resume serviço robocopa
        run: |
          echo "Ligando serviço ${{ secrets.RENDER_SERVICE_ID }} (10:00 BRT)..."
          http_code=$(curl -sS -o /tmp/render-resume.json -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/resume" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json")
          echo "HTTP $http_code"
          cat /tmp/render-resume.json
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi

      - name: Aguardar /health (Robocopa OK)
        run: |
          echo "Aguardando cold start do Render free tier em $HEALTH_URL ..."
          max_attempts=20
          sleep_secs=15
          for i in $(seq 1 "$max_attempts"); do
            echo "--- Tentativa $i/$max_attempts ---"
            body=$(curl -sS --max-time 45 "$HEALTH_URL" 2>/dev/null || true)
            if echo "$body" | grep -q "Robocopa OK"; then
              echo "Serviço no ar: $body"
              exit 0
            fi
            if echo "$body" | grep -qi "suspended"; then
              echo "Ainda suspenso, aguardando resume propagar..."
            elif [ -n "$body" ]; then
              echo "Resposta (parcial): $(echo "$body" | tr -d '\n' | head -c 120)"
            else
              echo "Sem resposta ainda (waking up ou rede)..."
            fi
            sleep "$sleep_secs"
          done
          echo "::error::/health não retornou 'Robocopa OK' após $((max_attempts * sleep_secs))s"
          exit 1
